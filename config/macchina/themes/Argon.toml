# Argon

spacing = 1
padding = 0
hide_ascii = false
prefer_small_ascii = false
separator = "->"
key_color = "Cyan"
separator_color = "Yellow"

[palette]
type = "Light"
glyph = " ● "
visible = true

[bar]
glyph = "●"
symbol_open = '('
symbol_close = ')'
visible = false
hide_delimiters = true

[box]
title = "host"
border = "plain"
visible = true

[box.inner_margin]
x = 2
y = 1

[custom_ascii]
color = "Yellow"

[randomize]
key_color = false
separator_color = false
pool = "base"

[keys]
host = "Host"
kernel = "Kernel"
battery = "Battery"
os = "OS"
de = "DE"
wm = "WM"
distro = "Distro"
terminal = "Terminal"
shell = "Shell"
packages = "Packages"
uptime = "Uptime"
memory = "Memory"
machine = "Machine"
local_ip = "IP"
backlight = "Brightness"
resolution = "Resolution"
cpu_load = "CPU Load"
cpu = "CPU"
gpu = "GPU"
disk_space = "Disk Space"
